<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Shorts Motivacionales</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0f;
      --surface: #18181c;
      --border:  #2e2e38;
      --accent:  #7c3aed;
      --accent2: #a855f7;
      --text:    #e2e8f0;
      --muted:   #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .hero {
      text-align: center;
      max-width: 520px;
    }

    .logo {
      font-size: 3.5rem;
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent2), #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .btn-enter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 8px 32px #7c3aed44;
    }
    .btn-enter:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn-enter:active { transform: scale(0.97); }

    .features {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 40px;
      flex-wrap: wrap;
    }
    .feature {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.9rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .feature span { font-size: 1.2rem; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo">🎬</div>
    <h1>Generador de Shorts Motivacionales</h1>
    <p>Crea audio, imágenes y videos completos de forma automática con inteligencia artificial.</p>

    <a href="/creacion_de_contenido.html" class="btn-enter">
      Crear Contenido →
    </a>

    <div class="features">
      <div class="feature"><span>🎙️</span> Audio con TTS</div>
      <div class="feature"><span>🖼️</span> Imágenes con IA</div>
      <div class="feature"><span>📹</span> Video completo</div>
    </div>
  </div>
</body>
</html>
